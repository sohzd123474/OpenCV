name = "opencv-attendance-dashboard"
main = "worker.js"
compatibility_date = "2026-07-01"

# Learning-tab AI tutor (worker.js handleCopilot -> POST /api/copilot).
# The model id and endpoint are non-secret VARS and live here in version control.
# LM_API_BASE and LM_MODEL are plain vars; the token comes from the Secrets Store
# binding below. worker.js bindingValue() reads either a plain string or a Secrets
# Store binding's async .get(). With no token bound, /api/copilot returns 503 and
# the console falls back to its built-in explainers.
[vars]
LM_API_BASE = "https://ai.hobofinance.com/v1"
LM_MODEL = "google/gemma-4-12b-qat"

# Cloudflare Secrets Store binding for the LLM API token — surfaces as
# env.LM_API_TOKEN. store_id is a non-secret identifier (the token value stays in
# the store, never here). If secret_name in your store differs, update it.
[[secrets_store_secrets]]
binding     = "LM_API_TOKEN"
store_id    = "6ecddb75269a4d48b7919e013366633a"
secret_name = "LM_API_TOKEN"

# Optional: persistent storage for the dashboard. Without this binding the worker
# runs on in-memory demo storage (per-isolate, resets on redeploy). To enable:
#   wrangler d1 create attendance
# then uncomment and paste the database_id it prints.
# [[d1_databases]]
# binding       = "DB"
# database_name = "attendance"
# database_id   = ""

# Optional: require "Authorization: Bearer <key>" on write endpoints
# (/api/checkin, POST /api/employees). Set with:
#   wrangler secret put DASHBOARD_API_KEY
